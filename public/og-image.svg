<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080e1a"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blob -->
  <ellipse cx="280" cy="315" rx="320" ry="220" fill="#10b981" opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="920" cy="200" rx="280" ry="200" fill="#6366f1" opacity="0.06" filter="url(#blur)"/>

  <!-- Logo icon box -->
  <rect x="80" y="220" width="72" height="72" rx="16" fill="#10b981" opacity="0.12"/>
  <rect x="80" y="220" width="72" height="72" rx="16" stroke="#10b981" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- Mini chart in logo -->
  <rect x="94"  y="272" width="8"  height="8"  rx="2" fill="#10b981" opacity="0.6"/>
  <rect x="106" y="264" width="8"  height="16" rx="2" fill="#10b981" opacity="0.8"/>
  <rect x="118" y="268" width="8"  height="12" rx="2" fill="#10b981" opacity="0.7"/>
  <rect x="130" y="256" width="8"  height="24" rx="2" fill="#10b981"/>
  <polyline points="98,271 110,263 122,267 134,255" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="134" cy="255" r="3.5" fill="#10b981"/>
  <circle cx="134" cy="255" r="1.8" fill="white" opacity="0.9"/>
  <text x="87" y="248" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#10b981">₹</text>

  <!-- App name -->
  <text x="170" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-1" fill="white">Finance</text>
  <text x="474" y="262" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-1" fill="url(#accent)">AI</text>

  <!-- Tagline -->
  <text x="170" y="302" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#94a3b8" letter-spacing="0.2">AI-powered personal finance &amp; crisis planning</text>

  <!-- Divider line -->
  <line x1="80" y1="335" x2="520" y2="335" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Feature pills -->
  <g transform="translate(80, 360)">
    <!-- Expenses -->
    <rect width="130" height="32" rx="16" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#10b981">📊 Expenses</text>
  </g>
  <g transform="translate(224, 360)">
    <rect width="140" height="32" rx="16" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#a5b4fc">📈 Investments</text>
  </g>
  <g transform="translate(378, 360)">
    <rect width="118" height="32" rx="16" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#fbbf24">🤖 AI Advisor</text>
  </g>
  <g transform="translate(80, 406)">
    <rect width="120" height="32" rx="16" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#f87171">🗺️ Crisis Plan</text>
  </g>
  <g transform="translate(214, 406)">
    <rect width="110" height="32" rx="16" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#2dd4bf">💰 Budget</text>
  </g>
  <g transform="translate(338, 406)">
    <rect width="158" height="32" rx="16" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui,sans-serif" font-size="14" fill="#c4b5fd">🏦 Debt Manager</text>
  </g>

  <!-- Right side: decorative chart -->
  <g transform="translate(680, 120)">
    <!-- Chart card -->
    <rect width="440" height="390" rx="20" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>

    <!-- Chart bars -->
    <rect x="40"  y="260" width="40" height="80"  rx="6" fill="#10b981" opacity="0.25"/>
    <rect x="98"  y="210" width="40" height="130" rx="6" fill="#10b981" opacity="0.35"/>
    <rect x="156" y="230" width="40" height="110" rx="6" fill="#10b981" opacity="0.30"/>
    <rect x="214" y="170" width="40" height="170" rx="6" fill="#10b981" opacity="0.45"/>
    <rect x="272" y="140" width="40" height="200" rx="6" fill="#10b981" opacity="0.60"/>
    <rect x="330" y="100" width="40" height="240" rx="6" fill="url(#accent)"/>

    <!-- Trend line -->
    <polyline
      points="60,259 118,209 176,229 234,169 292,139 350,99"
      stroke="url(#accent)"
      stroke-width="3"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- Dots on line -->
    <circle cx="350" cy="99"  r="6" fill="#10b981"/>
    <circle cx="350" cy="99"  r="3" fill="white"/>
    <circle cx="292" cy="139" r="4" fill="#10b981" opacity="0.7"/>
    <circle cx="234" cy="169" r="4" fill="#10b981" opacity="0.7"/>

    <!-- Chart label -->
    <text x="40" y="60" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="white" opacity="0.7">Portfolio Growth</text>
    <text x="40" y="82" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#10b981">+24.0%</text>

    <!-- Horizontal grid lines -->
    <line x1="30" y1="340" x2="410" y2="340" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="30" y1="290" x2="410" y2="290" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="30" y1="240" x2="410" y2="240" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="30" y1="190" x2="410" y2="190" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="30" y1="140" x2="410" y2="140" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="60" fill="#ffffff" fill-opacity="0.02"/>
  <line x1="0" y1="570" x2="1200" y2="570" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
  <text x="80" y="603" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">financeai.app</text>
  <text x="1120" y="603" text-anchor="end" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">Personal Finance Intelligence</text>
</svg>
